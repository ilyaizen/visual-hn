<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Visual-HN thumbnails — options</title>
    <style>
      body { font: 14px/1.5 system-ui, sans-serif; margin: 16px; min-width: 320px; }
      label { display: block; margin: 12px 0 4px; font-weight: 600; }
      input[type="text"], input[type="number"] { width: 100%; padding: 6px; box-sizing: border-box; }
      .row { display: flex; align-items: center; gap: 8px; }
      .row label { margin: 0; font-weight: 400; }
      button { margin-top: 16px; padding: 8px 16px; }
      #status { margin-left: 10px; color: green; }
    </style>
  </head>
  <body>
    <h1>Visual-HN thumbnails</h1>

    <div class="row">
      <input type="checkbox" id="enabled" />
      <label for="enabled">Enable thumbnails on hcker.news</label>
    </div>

    <label for="apiBase">API base URL</label>
    <input type="text" id="apiBase" placeholder="https://hn.is-ai-good-yet.com" />

    <p style="margin-top: 16px; color: #666;">
      Tip: Visual-HN settings now appear in the hcker.news settings panel. Press
      <kbd>I</kbd> on hcker.news to toggle thumbnails.
    </p>

    <button id="save">Save</button>
    <span id="status"></span>

    <script src="options.js"></script>
  </body>
</html>
